name: smoke-checks

on:
  # Handmatig starten (site + modus).
  workflow_dispatch:
    inputs:
      site:
        description: "Site-slug (leeg = alle sites)"
        required: false
        default: ""
      mode:
        description: "Modus"
        required: false
        default: "test"
        type: choice
        options: ["test", "scan"]
  # Getriggerd door WordPress (na update) of vanuit het dashboard (scan/test).
  repository_dispatch:
    types: [site-updated, run-requested]
  # Optioneel: dagelijkse vangnet-run (06:00 UTC). Verwijder als niet gewenst.
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Playwright browser installeren
        run: npx playwright install --with-deps chromium

      - name: Smoke-checks draaien
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RUN_TRIGGER: ${{ github.event_name }}
          SITE_FILTER: ${{ github.event.inputs.site || github.event.client_payload.site || '' }}
          RUN_MODE: ${{ github.event.inputs.mode || github.event.client_payload.mode || 'test' }}
        run: npm run smoke

      - name: Resultaten als artifact bewaren
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
          retention-days: 14
