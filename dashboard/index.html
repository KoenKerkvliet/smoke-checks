<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smoke-checks dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Smoke-checks</h1>
      <nav class="mainnav">
        <a href="index.html" class="active">Dashboard</a>
        <a href="sites.html">Sites</a>
      </nav>
      <span class="spacer"></span>
      <button id="logout" hidden>Uitloggen</button>
    </header>

    <main id="app">
      <section id="login" hidden>
        <form id="login-form" class="card">
          <h2>Inloggen</h2>
          <label>E-mail<input type="email" id="email" required autocomplete="email" /></label>
          <label>Wachtwoord<input type="password" id="password" required autocomplete="current-password" /></label>
          <button type="submit">Inloggen</button>
          <p id="login-error" class="error"></p>
        </form>
      </section>

      <section id="dashboard" hidden>
        <div id="meta" class="meta"></div>
        <h2 class="block-title">Recente runs</h2>
        <div id="recent" class="card"></div>
        <h2 class="block-title">Details van geselecteerde run</h2>
        <div id="sites" class="grid"></div>
      </section>

      <p id="loading">Laden…</p>
    </main>

    <!-- Klassieke scripts: werkt door dubbelklik (file://) én op GitHub Pages -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
